services:

  studio-frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile.prod
    container_name: studio-frontend
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "wget", "--spider", "-q", "http://localhost"]
      interval: 30s
      timeout: 5s
      retries: 3

  studio-backend:
    build:
      context: ./backend
      dockerfile: Dockerfile.prod
    container_name: studio-backend
    restart: unless-stopped
    environment:
      APP_ENV: production
      APP_DEBUG: false
      APP_KEY: ${APP_KEY}
      DB_CONNECTION: mysql
      DB_HOST: studio-db
      DB_PORT: 3306
      DB_DATABASE: studio_db
      DB_USERNAME: laravel
      DB_PASSWORD: laravel
    depends_on:
      studio-db:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost"]
      interval: 30s
      timeout: 5s
      retries: 5

  studio-db:
    image: mysql:8.0
    container_name: studio-db
    restart: unless-stopped
    environment:
      MYSQL_DATABASE: studio_db
      MYSQL_ROOT_PASSWORD: laravel
      MYSQL_USER: laravel
      MYSQL_PASSWORD: laravel
    volumes:
      - studio_db_data:/var/lib/mysql
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost"]
      interval: 10s
      timeout: 5s
      retries: 5

  studio-phpmyadmin:
    image: phpmyadmin/phpmyadmin
    container_name: studio-phpmyadmin
    restart: unless-stopped
    environment:
      PMA_HOST: studio-db
      PMA_USER: laravel
      PMA_PASSWORD: laravel
    depends_on:
      studio-db:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "wget", "--spider", "-q", "http://localhost"]
      interval: 30s
      timeout: 5s
      retries: 3

volumes:
  studio_db_data:
