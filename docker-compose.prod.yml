services:
  studio-frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile.prod
    container_name: studio-frontend
    restart: unless-stopped

  studio-backend:
    build:
      context: ./backend
      dockerfile: Dockerfile.prod
    container_name: studio-backend
    restart: unless-stopped
    environment:
      APP_ENV: production
      APP_DEBUG: false
      APP_KEY: ${APP_KEY}
      DB_CONNECTION: mysql
      DB_HOST: studio-db
      DB_PORT: 3306
      DB_DATABASE: studio_db
      DB_USERNAME: laravel
      DB_PASSWORD: laravel
    depends_on:
      - studio-db
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost/api/health"]
      interval: 30s
      retries: 3
      start_period: 10s
      timeout: 5s

  studio-db:
    image: mysql:8.0
    container_name: studio-db
    restart: unless-stopped
    environment:
      MYSQL_DATABASE: studio_db
      MYSQL_ROOT_PASSWORD: studio
      MYSQL_USER: studio
      MYSQL_PASSWORD: studio
    volumes:
      - studio_db_data:/var/lib/mysql
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost"]
      interval: 30s
      retries: 3
      start_period: 10s
      timeout: 5s

volumes:
  studio_db_data:
