services:
  studio-frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile.prod
    container_name: studio-frontend
    restart: unless-stopped
    networks:
      - shared-db-network

  studio-backend:
    build:
      context: ./backend
      dockerfile: Dockerfile.prod
    container_name: studio-backend
    restart: unless-stopped
    environment:
      APP_ENV: production
      APP_DEBUG: false
      APP_KEY: ${APP_KEY}
      DB_CONNECTION: mysql
      DB_HOST: studio-db
      DB_PORT: 3306
      DB_DATABASE: studio_db
      DB_USERNAME: studio
      DB_PASSWORD: a0adff46cc4d1838816a42b1d1ad14e8
    depends_on:
      - studio-db
    networks:
      - shared-db-network
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost/api/health"]
      interval: 30s
      retries: 3
      start_period: 10s
      timeout: 5s

  studio-db:
    image: mysql:8.0
    container_name: studio-db
    restart: unless-stopped
    environment:
      MYSQL_DATABASE: studio_db
      MYSQL_ROOT_USER: yazo
      MYSQL_ROOT_PASSWORD: 723bbdba721637e7a63b91f4b5df8520
      MYSQL_USER: studio
      MYSQL_PASSWORD: a0adff46cc4d1838816a42b1d1ad14e8
    volumes:
      - studio_db_data:/var/lib/mysql
    networks:
      - shared-db-network
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost"]
      interval: 30s
      retries: 3
      start_period: 10s
      timeout: 5s

volumes:
  studio_db_data:

networks:
  shared-db-network:
    external: true
