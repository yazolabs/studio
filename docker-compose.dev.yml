services:
  studio-frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile.dev
    container_name: studio-frontend
    ports:
      - "5173:5173"
    environment:
      - VITE_DEV_HOST=0.0.0.0
      - CHOKIDAR_USEPOLLING=1
      - WATCHPACK_POLLING=true
    volumes:
      - ./frontend:/app
      - studio_node_modules:/app/node_modules
    command: >
      sh -lc "
        mkdir -p /app/node_modules &&
        chown -R node:node /app /app/node_modules &&
        su node -s /bin/sh -c 'npm ci && npm run dev -- --host 0.0.0.0 --port 5173'
      "

  studio-backend:
    build:
      context: ./backend
      dockerfile: Dockerfile.dev
      args:
        UID: ${UID}
        GID: ${GID}
    container_name: studio-backend
    volumes:
      - ./backend:/var/www/html
    ports:
      - "8000:80"
    environment:
      - APACHE_RUN_USER=www-data
      - APACHE_RUN_GROUP=www-data
    depends_on:
      - studio-db

  studio-db:
    image: mysql:8.0
    container_name: studio-db
    restart: "no"
    ports:
      - "3306:3306"
    environment:
      MYSQL_DATABASE: studio_db
      MYSQL_ROOT_PASSWORD: laravel
      MYSQL_USER: laravel
      MYSQL_PASSWORD: laravel
    volumes:
      - studio_db_data:/var/lib/mysql

  studio-phpmyadmin:
    image: phpmyadmin/phpmyadmin
    container_name: studio-phpmyadmin
    restart: "no"
    ports:
      - "8080:80"
    environment:
      PMA_HOST: studio-db
      PMA_USER: laravel
      PMA_PASSWORD: laravel

volumes:
  studio_db_data:
  studio_node_modules:
